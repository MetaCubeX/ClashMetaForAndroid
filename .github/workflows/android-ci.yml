name: Android CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main
      - master
      - 'feat/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
          # Caches ~/.gradle (wrapper dist + dependency cache) between runs, so a
          # warm runner never re-downloads the golang gradle-plugin from the
          # GitHub-raw maven mirror — that endpoint 429s under CI load.
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Guard - HandlerService must not exist
        run: |
          if grep -R --line-number --fixed-strings "HandlerService" app/src/main service/src/main core/src/main; then
            echo "HandlerService reference detected. This path is forbidden."
            exit 1
          fi
          echo "HandlerService guard passed."

      - name: Build Alpha Debug APK
        run: ./gradlew assembleAlphaDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: clashfest-alpha-apk
          path: app/build/outputs/apk/**/*.apk
