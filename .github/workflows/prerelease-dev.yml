name: Dev Pre-Release APK

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Ensure tags for root and core submodule
        run: |
          git fetch --tags --force
          git -C core/src/foss/golang/clash fetch --tags --force

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Guard - HandlerService must not exist
        run: |
          if grep -R --line-number --fixed-strings "HandlerService" app/src/main service/src/main core/src/main; then
            echo "HandlerService reference detected. This path is forbidden."
            exit 1
          fi
          echo "HandlerService guard passed."

      - name: Build Alpha Debug APK
        run: ./gradlew assembleAlphaDebug

      - name: Remove Android signing files
        if: always()
        run: rm -f signing.properties release.keystore

      - name: Collect APKs
        run: |
          mkdir -p release-artifacts
          SHORT_SHA="${GITHUB_SHA::7}"

          find app/build/outputs/apk -name "*.apk" | while read -r apk; do
            base="$(basename "$apk")"

            abi="universal"
            if [[ "$base" == *"arm64-v8a"* ]]; then abi="arm64-v8a"; fi
            if [[ "$base" == *"armeabi-v7a"* ]]; then abi="armeabi-v7a"; fi
            if [[ "$base" == *"x86_64"* ]]; then abi="x86_64"; fi
            if [[ "$base" == *"x86"* && "$base" != *"x86_64"* ]]; then abi="x86"; fi

            flavor="alpha"
            if [[ "$base" == *"meta"* ]]; then flavor="meta"; fi

            out="clashfest-dev-${SHORT_SHA}-${flavor}-${abi}.apk"
            cp "$apk" "release-artifacts/$out"
          done

          ls -la release-artifacts

      - name: Generate changelog
        run: |
          BASE_TAG="$(git tag --merged HEAD --list 'v0.*' --sort=-v:refname | head -n1)"

          if [ -n "$BASE_TAG" ]; then
            CHANGE_COMMITS="$(git log "${BASE_TAG}..HEAD" --pretty=format:'- `%h` %s - @%an')"
          else
            CHANGE_COMMITS="$(git log -n 15 --pretty=format:'- `%h` %s - @%an')"
          fi

          if [ -z "$CHANGE_COMMITS" ]; then
            CHANGE_COMMITS="- No code changes since the last stable tag."
          fi

          {
            echo "## Dev Pre-Release"
            echo
            echo "Automatic development build from \`dev\`."
            echo
            echo "**Commit:** \`${GITHUB_SHA::7}\`"
            echo
            if [ -n "$BASE_TAG" ]; then
              echo "**Changes since:** \`${BASE_TAG}\`"
              echo
            fi
            echo "## What's included"
            echo
            echo "$CHANGE_COMMITS"
          } > RELEASE_BODY.md

          cat RELEASE_BODY.md

      - name: Delete previous dev-latest assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/dev-latest" --jq .id 2>/dev/null || true)"
          if [ -z "$RELEASE_ID" ]; then
            echo "No existing dev-latest release yet, skip asset cleanup."
            exit 0
          fi

          ASSET_IDS="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --jq '.[].id' 2>/dev/null || true)"
          if [ -z "$ASSET_IDS" ]; then
            echo "No old assets to delete."
            exit 0
          fi

          echo "$ASSET_IDS" | while read -r ASSET_ID; do
            [ -z "$ASSET_ID" ] && continue
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}"
            echo "Deleted asset id=$ASSET_ID"
          done

      - name: Publish/Update Dev Pre-Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view dev-latest >/dev/null 2>&1; then
            gh release edit dev-latest \
              --title "ClashFest Dev Build" \
              --notes-file RELEASE_BODY.md \
              --prerelease \
              --target dev \
              --latest=false
          else
            gh release create dev-latest \
              --title "ClashFest Dev Build" \
              --notes-file RELEASE_BODY.md \
              --prerelease \
              --target dev \
              --latest=false
          fi

          gh release upload dev-latest release-artifacts/*.apk --clobber
