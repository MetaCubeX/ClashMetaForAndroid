name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Guard: HandlerService must not exist
        run: |
          if grep -R --line-number --fixed-strings "HandlerService" app/src/main service/src/main core/src/main; then
            echo "HandlerService reference detected. This path is forbidden."
            exit 1
          fi
          echo "HandlerService guard passed."

      - name: Build Alpha Debug APK
        run: ./gradlew assembleAlphaDebug

      - name: Collect APKs
        run: |
          mkdir -p release-artifacts
          VERSION_TAG="${GITHUB_REF_NAME}"
          find app/build/outputs/apk -name "*.apk" | while read -r apk; do
            base="$(basename "$apk")"
            abi="universal"
            if [[ "$base" == *"arm64-v8a"* ]]; then abi="arm64-v8a"; fi
            if [[ "$base" == *"armeabi-v7a"* ]]; then abi="armeabi-v7a"; fi
            if [[ "$base" == *"x86_64"* ]]; then abi="x86_64"; fi
            if [[ "$base" == *"x86"* && "$base" != *"x86_64"* ]]; then abi="x86"; fi

            flavor="alpha"
            if [[ "$base" == *"meta"* ]]; then flavor="meta"; fi

            out="clashfest-${VERSION_TAG}-${flavor}-${abi}.apk"
            cp "$apk" "release-artifacts/$out"
          done
          ls -la release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true