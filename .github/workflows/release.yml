name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production-release

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Restore Android signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Signing secrets are missing. Configure ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          cat > signing.properties <<EOF
          keystore.password=$ANDROID_KEYSTORE_PASSWORD
          key.alias=$ANDROID_KEY_ALIAS
          key.password=$ANDROID_KEY_PASSWORD
          EOF

      - name: Guard - HandlerService must not exist
        run: |
          if grep -R --line-number --fixed-strings "HandlerService" app/src/main service/src/main core/src/main; then
            echo "HandlerService reference detected. This path is forbidden."
            exit 1
          fi
          echo "HandlerService guard passed."

      - name: Build Alpha Release APK
        run: ./gradlew assembleAlphaRelease

      - name: Remove Android signing files
        if: always()
        run: rm -f signing.properties release.keystore

      - name: Collect APKs
        run: |
          mkdir -p release-artifacts
          find app/build/outputs/apk -name "*.apk" | while read -r apk; do
            base="$(basename "$apk")"
            abi="universal"
            if [[ "$base" == *"arm64-v8a"* ]]; then abi="arm64-v8a"; fi
            if [[ "$base" == *"armeabi-v7a"* ]]; then abi="armeabi-v7a"; fi
            if [[ "$base" == *"x86_64"* ]]; then abi="x86_64"; fi
            if [[ "$base" == *"x86"* && "$base" != *"x86_64"* ]]; then abi="x86"; fi

            flavor="alpha"
            if [[ "$base" == *"meta"* ]]; then flavor="meta"; fi

            # Version-less, stable filename so the GitHub "latest release"
            # direct link works: releases/latest/download/clashfest-<flavor>-<abi>.apk
            # (the version stays on the release page/tag, #85).
            out="clashfest-${flavor}-${abi}.apk"
            cp "$apk" "release-artifacts/$out"
          done
          ls -la release-artifacts

      - name: Remove signing files before publishing
        if: always()
        run: rm -f release.keystore signing.properties

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-artifacts/*.apk --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-artifacts/*.apk --generate-notes
          fi
